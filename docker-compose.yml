# DevBrain — Universal Persistent Memory & Dev Factory
# ====================================================
#
# Local-first, model-agnostic, app-agnostic development infrastructure.
#
# Usage:
#   docker compose up -d devbrain-db    # Start the database
#   docker compose down                 # Stop
#   docker compose logs -f devbrain-db  # Tail logs
#
# Ports:
#   Default 5433:5432 — override host port via DEVBRAIN_DB_HOST_PORT in .env
#   to avoid conflicts with other Postgres instances.
#
# Note: Ollama runs natively on the host (not in Docker) for Metal/CUDA
# acceleration. Install separately and ensure DEVBRAIN_OLLAMA_URL points to it.

services:
  # =============================================================================
  # Database — PostgreSQL 17 + pgvector
  # =============================================================================
  devbrain-db:
    image: pgvector/pgvector:pg17
    container_name: devbrain-db
    restart: unless-stopped
    volumes:
      - devbrain-pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${DEVBRAIN_DB_USER:-devbrain}
      POSTGRES_PASSWORD: ${DEVBRAIN_DB_PASSWORD:-devbrain-local}
      POSTGRES_DB: ${DEVBRAIN_DB_NAME:-devbrain}
    ports:
      - "${DEVBRAIN_DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEVBRAIN_DB_USER:-devbrain}"]
      interval: 5s
      retries: 5

volumes:
  devbrain-pgdata:
